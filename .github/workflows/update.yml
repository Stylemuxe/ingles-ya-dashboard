name: Actualizar Dashboard

on:
  schedule:
    - cron: '0 */4 * * *'   # Cada 4 horas
  workflow_dispatch:          # También se puede correr manualmente

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr script de actualización
        env:
          TOKEN_INGLES_YA: ${{ secrets.TOKEN_INGLES_YA }}
        run: python actualizar_ingles.py

      - name: Commit y push de datos actualizados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_ingles.js data_ingles.json
          git diff --staged --quiet || git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
