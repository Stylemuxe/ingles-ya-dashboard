name: Actualizar Dashboard

on:
  schedule:
    - cron: '0 */4 * * *'   # Cada 4 horas (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
  workflow_dispatch:          # Permite correrlo manualmente desde GitHub

# CRITICO: sin esto el git push falla con exit code 1
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr script de actualización
        env:
          TOKEN_INGLES_YA: ${{ secrets.TOKEN_INGLES_YA }}
        run: python actualizar_ingles.py

      - name: Commit y push de datos actualizados
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data_ingles.js data_ingles.json data_*.json meses.json
          git diff --staged --quiet && echo "Sin cambios nuevos" || (git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
